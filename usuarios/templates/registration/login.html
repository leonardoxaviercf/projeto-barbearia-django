{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Barbearia Xavier</title>
    <link rel="stylesheet" href="{% static 'barbearia/style.css' %}">
</head>
<body>
    <div class="login-container">
        <form method="post" class="login-form">
            {% csrf_token %}
            <h2 class="gold-text">Acesse sua Conta</h2>
            
            <div class="form-group">
                <label for="id_username">Usuário:</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="id_password">Senha:</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-home btn-primary-custom">Entrar</button>
        </form>
    </div>
</body>
</html>
