{% extends 'barbearia/base.html' %}

{% block title %}Entrar - Barbearia Xavier{% endblock %}

{% block content %}
<div class="auth-page-container"> 
    <form method="post" class="login-form">
        {% csrf_token %}
        <h2 class="golden-text text-center mb-30">Acesse sua Conta</h2>
    
        <div class="form-group">
            <label for="id_username">E-mail:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Senha:</label>
            {{ form.password }}
        </div>
        
        <button type="submit" class="btn-custom btn-primary w-100 mt-20">
            Entrar
        </button>
    
        <p class="text-center mt-20 text-sm">
            Ainda não tem conta? <a href="{% url 'cadastro' %}" class="golden-text">Cadastre-se aqui</a>.
        </p>

        <p class="text-center mt-20 text-sm">
            <a href="{% url 'password_reset' %}" class="golden-text">Esqueci minha senha</a>
        </p>
    </form>
</div>
{% endblock %}
