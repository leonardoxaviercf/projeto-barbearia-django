{% extends 'barbearia/base.html' %}

{% block title %}Recuperar Senha - Barbearia Xavier{% endblock %}

{% block content %}
<div class="auth-page-container">
    <div class="login-form">
        <h2 class="golden-text text-center mb-20">Recuperar Senha</h2>
        <p class="text-center text-sm mb-25">Informe seu e-mail cadastrado e enviaremos um link para criar uma nova senha.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="golden-text">E-mail:</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn-custom btn-primary w-100 mt-20">
                Enviar Link de Recuperação
            </button>
        </form>
    </div>
</div>
{% endblock %}
